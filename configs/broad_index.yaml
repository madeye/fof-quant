project:
  name: fof-quant-broad-index
  timezone: Asia/Shanghai

data:
  provider: tushare
  cache_dir: cache/broad_index
  start_date: "2018-01-01"
  end_date: null

universe:
  fund_types:
    - broad_index_etf
  min_listing_days: 252
  min_avg_daily_amount: 10000000
  include: []
  exclude: []

strategy:
  rebalance_frequency: monthly
  benchmark: "000300.SH"
  cash_buffer: 0.01
  max_weight: 0.4
  min_holdings: 4
  turnover_limit: 0.5

factors:
  weights:
    momentum: 0.0
    tracking_error: -0.5
    fee: -0.3
    liquidity: 0.2

backtest:
  initial_cash: 1000000
  transaction_cost_bps: 2.0
  slippage_bps: 1.0

reports:
  output_dir: reports/broad_index
  formats:
    - excel
    - html
  llm_explanations: false
